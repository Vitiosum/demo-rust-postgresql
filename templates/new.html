{% extends "base.html" %}

{% block title %}New Incident{% endblock %}

{% block content %}
<a href="/" class="back-link">← Back to incidents</a>

<div class="page-header">
  <h1>New Incident</h1>
</div>

<div class="card form-card">
  {% if !error.is_empty() %}
  <div class="form-error">{{ error }}</div>
  {% endif %}

  <form method="post" action="/incidents">
    <div class="form-group">
      <label for="title">Title *</label>
      <input type="text" id="title" name="title" placeholder="Brief description of the incident" required>
    </div>

    <div class="form-group">
      <label for="service">Service *</label>
      <input type="text" id="service" name="service" placeholder="e.g. api-gateway, auth, billing">
    </div>

    <div class="form-group">
      <label for="severity">Severity *</label>
      <select id="severity" name="severity">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
        <option value="critical">Critical</option>
      </select>
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" name="description" placeholder="What happened? What is the impact?"></textarea>
      <p class="form-hint">Optional — describe the incident, impact, and any initial findings.</p>
    </div>

    <div style="display:flex;gap:8px;margin-top:8px">
      <button type="submit" class="btn btn-primary">Create incident</button>
      <a href="/" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
